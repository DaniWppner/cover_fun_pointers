# This compose file is meant to mount the linux directory in the docker container 
# to compile with wllvm and run analysis.

services:
  compile_llvm:
    build:
      context: .
      dockerfile: ./build_llvm/Dockerfile
    volumes:
      - ./build_llvm/llvm-project:/home/src/llvm-project
    command: /bin/bash
    tty: true
    stdin_open: true
